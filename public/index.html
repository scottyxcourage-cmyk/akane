<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>AKANE MD — Web Pair</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background: #0a0a0f;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            color: #fff;
            overflow: hidden;
        }

        /* Animated background */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 20% 50%, rgba(255, 105, 180, 0.08) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 20%, rgba(147, 51, 234, 0.08) 0%, transparent 50%),
                        radial-gradient(ellipse at 50% 80%, rgba(236, 72, 153, 0.06) 0%, transparent 50%);
            animation: bgPulse 8s ease-in-out infinite alternate;
            z-index: 0;
        }

        @keyframes bgPulse {
            0% { transform: scale(1) rotate(0deg); }
            100% { transform: scale(1.1) rotate(5deg); }
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 440px;
            padding: 20px;
        }

        /* Card */
        .card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 40px 36px;
            backdrop-filter: blur(20px);
            box-shadow: 0 25px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,105,180,0.1);
        }

        /* Logo area */
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-icon {
            font-size: 48px;
            display: block;
            margin-bottom: 12px;
            filter: drop-shadow(0 0 20px rgba(255,105,180,0.5));
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .logo h1 {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: 3px;
            background: linear-gradient(135deg, #ff69b4, #c084fc, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo p {
            color: rgba(255,255,255,0.4);
            font-size: 13px;
            margin-top: 6px;
            letter-spacing: 1px;
        }

        /* Divider */
        .divider {
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(255,105,180,0.3), transparent);
            margin: 24px 0;
        }

        /* Steps */
        .steps {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 28px;
        }

        .step {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .step-num {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff69b4, #c084fc);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .step span {
            font-size: 13px;
            color: rgba(255,255,255,0.65);
            line-height: 1.4;
        }

        /* Input */
        .input-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 1px;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
            letter-spacing: 1px;
        }

        input[type="text"]:focus {
            border-color: rgba(255,105,180,0.5);
            background: rgba(255,255,255,0.08);
            box-shadow: 0 0 0 3px rgba(255,105,180,0.1);
        }

        input[type="text"]::placeholder {
            color: rgba(255,255,255,0.2);
        }

        /* Button */
        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #ff69b4, #c084fc);
            color: #fff;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(255,105,180,0.35);
        }

        button:active:not(:disabled) { transform: translateY(0); }

        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        /* Loading spinner inside button */
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.4);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Result box */
        .result {
            margin-top: 20px;
            padding: 20px;
            border-radius: 14px;
            text-align: center;
            display: none;
        }

        .result.success {
            background: rgba(34,197,94,0.08);
            border: 1px solid rgba(34,197,94,0.2);
            display: block;
        }

        .result.error {
            background: rgba(239,68,68,0.08);
            border: 1px solid rgba(239,68,68,0.2);
            display: block;
        }

        .code-display {
            font-size: 36px;
            font-weight: 900;
            letter-spacing: 8px;
            color: #fff;
            background: rgba(255,255,255,0.06);
            border-radius: 10px;
            padding: 16px;
            margin: 12px 0;
            cursor: pointer;
            user-select: all;
            transition: background 0.2s;
            font-family: monospace;
        }

        .code-display:hover {
            background: rgba(255,255,255,0.1);
        }

        .result-label {
            font-size: 12px;
            color: rgba(255,255,255,0.4);
            margin-top: 4px;
        }

        .result-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .success .result-title { color: #4ade80; }
        .error .result-title { color: #f87171; }

        .hint {
            font-size: 12px;
            color: rgba(255,255,255,0.4);
            margin-top: 10px;
            line-height: 1.5;
        }

        /* Status badge */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-top: 10px;
        }

        .status-badge.connected {
            background: rgba(34,197,94,0.15);
            color: #4ade80;
            border: 1px solid rgba(34,197,94,0.3);
        }

        .status-badge .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
            animation: blink 1.5s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: rgba(255,255,255,0.2);
        }

        .footer span {
            background: linear-gradient(135deg, #ff69b4, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="logo">
                <span class="logo-icon">🌸</span>
                <h1>AKANE MD</h1>
                <p>WhatsApp Bot — Web Pair</p>
            </div>

            <div class="divider"></div>

            <div class="steps">
                <div class="step">
                    <div class="step-num">1</div>
                    <span>Enter your WhatsApp number with country code</span>
                </div>
                <div class="step">
                    <div class="step-num">2</div>
                    <span>Copy the pairing code you receive</span>
                </div>
                <div class="step">
                    <div class="step-num">3</div>
                    <span>Open WhatsApp → Linked Devices → Link with phone number</span>
                </div>
            </div>

            <div class="input-group">
                <label>Your WhatsApp Number</label>
                <input type="text" id="phoneInput" placeholder="e.g. 221701234567" maxlength="20" />
            </div>

            <button id="pairBtn" onclick="requestPairing()">
                🔗 Get Pairing Code
            </button>

            <div class="result" id="resultBox">
                <div class="result-title" id="resultTitle"></div>
                <div class="code-display" id="codeDisplay" title="Click to copy"></div>
                <div class="result-label" id="resultLabel"></div>
                <div class="hint" id="resultHint"></div>
            </div>
        </div>

        <div class="footer">
            Made with 🌸 by <span>AKANE KUROGAWA</span>
        </div>
    </div>

    <script>
        let pollingInterval = null;

        // Allow pressing Enter
        document.getElementById('phoneInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') requestPairing();
        });

        async function requestPairing() {
            const phone = document.getElementById('phoneInput').value.trim();
            if (!phone) {
                showError('Please enter your WhatsApp number.');
                return;
            }

            const btn = document.getElementById('pairBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Generating code...';

            hideResult();
            clearPolling();

            try {
                const res = await fetch('/pair', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone })
                });
                const data = await res.json();

                if (data.success) {
                    if (data.code === 'ALREADY_CONNECTED') {
                        showConnected();
                    } else {
                        showCode(data.code, phone.replace(/[^0-9]/g, ''));
                    }
                } else {
                    showError(data.message || 'Something went wrong. Try again.');
                }
            } catch (err) {
                showError('Network error. Please refresh and try again.');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '🔗 Get Pairing Code';
            }
        }

        function showCode(code, phone) {
            const box = document.getElementById('resultBox');
            const title = document.getElementById('resultTitle');
            const display = document.getElementById('codeDisplay');
            const label = document.getElementById('resultLabel');
            const hint = document.getElementById('resultHint');

            box.className = 'result success';
            title.textContent = '✅ Your Pairing Code';
            display.textContent = code;
            display.style.display = 'block';
            label.textContent = 'Click the code to copy';
            hint.innerHTML = `Open WhatsApp → ⋮ Menu → <b>Linked Devices</b> → <b>Link a Device</b> → <b>Link with phone number</b>`;

            display.onclick = () => {
                navigator.clipboard.writeText(code).then(() => {
                    display.textContent = '✅ Copied!';
                    setTimeout(() => display.textContent = code, 1500);
                });
            };

            // Start polling for connection status
            startPolling(phone);
        }

        function showConnected() {
            const box = document.getElementById('resultBox');
            const title = document.getElementById('resultTitle');
            const display = document.getElementById('codeDisplay');
            const label = document.getElementById('resultLabel');
            const hint = document.getElementById('resultHint');

            box.className = 'result success';
            title.textContent = '🟢 Bot Connected!';
            display.style.display = 'none';
            label.innerHTML = '<span class="status-badge connected"><span class="dot"></span> ONLINE</span>';
            hint.textContent = 'Your bot is active and listening for messages.';
        }

        function showError(msg) {
            const box = document.getElementById('resultBox');
            const title = document.getElementById('resultTitle');
            const display = document.getElementById('codeDisplay');
            const label = document.getElementById('resultLabel');
            const hint = document.getElementById('resultHint');

            box.className = 'result error';
            title.textContent = '❌ Error';
            display.style.display = 'none';
            label.textContent = msg;
            hint.textContent = '';
        }

        function hideResult() {
            document.getElementById('resultBox').className = 'result';
        }

        function startPolling(phone) {
            pollingInterval = setInterval(async () => {
                try {
                    const res = await fetch(`/status/${phone}`);
                    const data = await res.json();
                    if (data.status === 'connected') {
                        clearPolling();
                        showConnected();
                    }
                } catch (_) {}
            }, 4000);
        }

        function clearPolling() {
            if (pollingInterval) {
                clearInterval(pollingInterval);
                pollingInterval = null;
            }
        }
    </script>
</body>
</html>
